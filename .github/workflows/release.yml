name: Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.0, 1.2.4, snapshot-pre1.0_1)'
        required: true
        default: 'snapshot'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish
        run: >
          dotnet publish BetaSharp/BetaSharp.Client.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output ./publish/${{ matrix.rid }}

      - name: Zip (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path ./publish/${{ matrix.rid }}/* -DestinationPath ./${{ matrix.rid }}.zip

      - name: Zip (Linux & macOS)
        if: matrix.os != 'windows-latest'
        run: zip -r ./${{ matrix.rid }}.zip ./publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: ./${{ matrix.rid }}.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          prerelease: ${{ contains(github.event.inputs.version, 'snapshot') || contains(github.event.inputs.version, 'pre') || contains(github.event.inputs.version, 'alpha') || contains(github.event.inputs.version, 'beta') }}
          files: ./artifacts/**/*.zip