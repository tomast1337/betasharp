name: .NET

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs:
    format:

        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v4
            -   name: Setup .NET
                uses: actions/setup-dotnet@v4
                with:
                    dotnet-version: 10.0.x
            -   name: Restore dependencies
                run: dotnet restore
            -   name: Format check
                run: dotnet format --verify-no-changes --verbosity diagnostic
